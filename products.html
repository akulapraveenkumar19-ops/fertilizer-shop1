<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - Sri Thirumala Traders</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f8f2;
}

header {
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 15px;
}

nav {
    display: flex;
    justify-content: center;
    background: #1b5e20;
}

nav a {
    color: white;
    padding: 14px 20px;
    text-decoration: none;
}

nav a:hover {
    background: #4caf50;
}

.container {
    padding: 20px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

button {
    background: #2e7d32;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #4caf50;
}

footer {
    text-align: center;
    background: #1b5e20;
    color: white;
    padding: 10px;
}
.demo {
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 20px;
    font-weight: bold;
   
    background: #2e7d32;
    color: white;
    padding: 15px;
    text-align: center;
}
</style>
</head>

<body>
<div class="demo">
    <img src="photo.jpeg" alt="Profile Picture" style="width:150px; height: 150px; border-radius:50%;" align="left"><br>
<h2>SRI THIRUMALA TRANDERS</h2>
</div>
<nav>
    
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="products.html">Products</a>
    <a href="index.html#contact">Contact</a>
</nav>
<div class="container" align="center">
    <h2>Available Fertilizers</h2>
    <div class="products" id="productList"></div>
</div>

<footer>
    <p>© 2026 Sri Thirumala Traders</p>
</footer>

<script>
const products = [
    {name:"Urea Fertilizer", price:300, img:"urea fertilizer.jpeg"},
    {name:"DAP Fertilizer", price:1200, img:"DAP.jpeg"},
    {name:"Potash", price:900, img:"potash.jpeg"},
    {name:"Organic Compost", price:500, img:"organic compost.jpeg"},
    {name:"NPK 20-20-20", price:1100, img:"NPK 20-20-20.jpeg"},
    {name:"Zinc Sulphate", price:450, img:"Zinc Sulphate.jpeg"},
    {name:"Bio Fertilizer", price:350, img:"Bio Fertilizer.jpeg"},
    {name:"Vermicompost", price:600, img:"Vermicompost.jpeg"},
    {name:"Ammonium Sulphate", price:700, img:"Ammonium Sulphate.jpeg"},
    {name:"Calcium Nitrate", price:800, img:"Calcium Nitrate.jpeg"},
    {name:"Magnesium Sulphate", price:650, img:"Magnesium Sulphate.jpeg"},
    {name:"Seaweed Fertilizer", price:950, img:"Seaweed Fertilizer.jpeg"},
    {name:"Bone Meal", price:400, img:"Bone Meal.jpeg"},
    {name:"Blood Meal", price:450, img:"Blood Meal.jpeg"},
    {name:"Fish Emulsion", price:550, img:"Fish Emulsion.jpeg"},
    {name:"Green Manure", price:300, img:"Green Manure.jpeg"},
    {name:"Humic Acid", price:750, img:"Humic Acid.jpeg"},
    {name:"Kelp Meal", price:850, img:"Kelp Meal.jpeg"},
    {name:"Neem Cake", price:500, img:"Neem Cake.jpeg"},
    {name:"Rock Phosphate", price:400, img:"Rock Phosphate.jpeg"},
    {name:"Sodium Nitrate", price:900, img:"Sodium Nitrate.jpeg"},
    {name:"Sulphate of Potash", price:1200, img:"Sulphate of Potash.jpeg"},
    {name:"Wood Ash", price:350, img:"Wood Ash.jpeg"},

];

const productList = document.getElementById("productList");

products.forEach(item => {
    const card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML = `
        <img src="${item.img}">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>
        <button onclick="buyProduct('${item.name}')">Buy Now</button>
    `;

    productList.appendChild(card);
});

function buyProduct(name){
    alert(name + " added to cart!");
}
</script>

</body>
</html>
